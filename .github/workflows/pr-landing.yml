name: PR Landing Agent

# Runs the pr-landing Actor on every PR event so review comments get
# addressed within delegated authority. Starts in dry-run; flip to live
# by setting the repo variable PR_LANDING_LIVE to "true".
#
# The workflow composes the LAG framework primitives (Host, Principal,
# Actor, ActorAdapter, checkToolPolicy) and runs the PrLandingActor
# against the current PR. See DECISIONS.md D16/D17 and
# design/actors-and-adapters.md for the architectural context.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
      # Re-fire on label transitions so noop / real auditor flip
      # the LAG-auditor signal as the autonomous-intent label is
      # added or removed. Without this, a PR that opens without
      # the label posts a SUCCESS noop on its head SHA, and a
      # later label-add never re-evaluates -- the stale SUCCESS
      # would let an autonomous-intent PR merge under a check
      # posted while it was unlabeled.
      - labeled
      - unlabeled
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run against'
        required: true
        type: number
      live:
        description: 'Live mode (true) or dry-run (false, default)'
        required: false
        type: boolean
        default: false

permissions:
  pull-requests: write
  contents: read

# One pr-landing run per PR at a time. Without this, overlapping
# pull_request / pull_request_review_comment events can spawn parallel
# runs that race on ensure-review prompts and reply posting. Cancel
# in-progress runs when a new one starts for the same PR; the new run
# sees the latest state anyway.
concurrency:
  group: pr-landing-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  pr-landing:
    name: pr-landing agent
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # Don't run on our own bot replies to avoid loops.
    if: >-
      (github.event_name != 'pull_request_review_comment' ||
       github.event.comment.user.login != 'github-actions[bot]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install (skip native post-install)
        # The pr-landing actor doesn't need any native deps. Skipping
        # post-install scripts avoids onnxruntime-node (transitive
        # @huggingface/transformers) trying to fetch a linux binary on
        # a runner that hasn't the right glibc. Workflow build step
        # below uses tsc, not anything that touches ONNX.
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Bootstrap pr-landing canon
        run: node scripts/bootstrap-pr-landing-canon.mjs
        env:
          LAG_OPERATOR_ID: apex-agent
          LAG_AGENT_ID: claude-agent

      - name: Determine PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Decide live-or-dry
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LIVE="${{ inputs.live }}"
          else
            LIVE="${{ vars.PR_LANDING_LIVE }}"
          fi
          if [ "$LIVE" = "true" ]; then
            echo "flag=--live" >> "$GITHUB_OUTPUT"
            echo "label=LIVE" >> "$GITHUB_OUTPUT"
          else
            echo "flag=--dry-run" >> "$GITHUB_OUTPUT"
            echo "label=DRY-RUN" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pr-landing actor (${{ steps.mode.outputs.label }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # LAG_OPS_PAT is only injected for same-repo (non-fork)
          # PRs. Fork PRs execute PR-controlled code from the
          # checkout; exposing the machine-user PAT there would
          # let a malicious fork exfiltrate the token. Same-repo
          # PRs can only be opened by collaborators, so the code-
          # trust assumption holds. Fork PRs see LAG_OPS_PAT as
          # empty; the failsafe pre-check logs 'missing-token' and
          # proceeds without triggering the review failsafe. The
          # external reviewer's own auto-review still runs on fork
          # PRs independently of this branch.
          LAG_OPS_PAT: ${{ (github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name) && secrets.LAG_OPS_PAT || '' }}
        run: |
          node scripts/run-pr-landing.mjs \
            --pr "${{ steps.pr.outputs.number }}" \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            ${{ steps.mode.outputs.flag }} \
            --max-iterations 3 \
            --origin github-action

  lag-auditor:
    name: LAG auditor gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'autonomous-intent')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install (skip native post-install)
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build
      - name: Extract plan-id label
        id: plan
        run: |
          PLAN_ID=$(jq -r '.pull_request.labels[] | select(.name | startswith("plan-id:")) | .name | split(":")[1]' "$GITHUB_EVENT_PATH")
          echo "plan-id=$PLAN_ID" >> "$GITHUB_OUTPUT"
      - name: Run auditor
        if: steps.plan.outputs.plan-id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/run-auditor.mjs --pr ${{ github.event.pull_request.number }} --plan ${{ steps.plan.outputs.plan-id }}

  # lag-auditor-noop is a migration shim. See plan-atom
  # plan-add-lag-auditor-noop-job-to-github-workf-cto-actor-20260424231351.
  #
  # DELETE WHEN: a real unlabeled-PR auditor ships (e.g.
  # scripts/run-auditor-unlabeled.mjs). Today scripts/run-auditor.mjs only
  # fires on `plan-id:` labels, so this shim is the only LAG-auditor signal
  # for the entire unlabeled-PR population. Once the real auditor covers
  # this path, remove this job in the same PR. Grep for `DELETE WHEN:` to
  # find other migration shims awaiting removal.
  #
  # Dual-mechanism note: branch protection registers `LAG-auditor` with
  # `app_id: -1`, so any poster satisfies the required-status. The sibling
  # `lag-auditor` job posts a commit status via scripts/run-auditor.mjs;
  # this job posts a check-run via actions/github-script. Both surface
  # under the same `LAG-auditor` context, which is intentional during the
  # migration but can confuse a reader of branch-protection logs who sees
  # one PR with a "check" and another with a "status" under the same name.
  #
  # Identity note: this job posts the check-run as `github-actions[bot]`
  # (via the default GITHUB_TOKEN). That is an attribution split from the
  # rest of the autonomous-intent surface, which posts as `lag-ceo[bot]`
  # via the lag-ceo GitHub App. Two cleaner identities were tried and
  # rejected:
  #   - LAG_OPS_PAT: rejected because GitHub's `checks.create` API
  #     requires a GitHub App auth context and refuses PATs with
  #     "You must authenticate via a GitHub App" (HTTP 403). The PAT
  #     identity is fine for issue/PR comments via the autonomous flow
  #     but not for check-runs.
  #   - actions/create-github-app-token@v2 with lag-ceo App credentials:
  #     the proper path; deferred because it requires adding
  #     LAG_CEO_APP_ID and LAG_CEO_APP_PRIVATE_KEY as repo secrets.
  #     Tracked as a follow-up; operator coordinates the secret rollout.
  # Until the App-token path lands, this job's check-run shows up under
  # `github-actions[bot]`. Branch protection accepts any poster of the
  # `LAG-auditor` context (per `app_id: -1` in the migration script), so
  # the merge gate is satisfied. The split is cosmetic; a future audit
  # filter on `lag-ceo[bot]` will miss this noop until the App-token
  # path lands.
  lag-auditor-noop:
    name: LAG-auditor (noop)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Same-repo PRs only. Two reasons:
    #   1. pull_request from forks gets a read-only GITHUB_TOKEN
    #      regardless of declared `permissions:`, so checks.create
    #      returns 403. Once `LAG-auditor` becomes required by
    #      branch protection, fork PRs would hang waiting for a
    #      check that cannot be created.
    #   2. pull_request_review and pull_request_review_comment
    #      events would re-fire this job on every review action,
    #      producing duplicate completed checks per head SHA.
    # The `pull_request` event guard mirrors the sibling
    # lag-auditor job at line 147. Fork-PR support for the
    # unlabeled-auditor population is deferred until the broader
    # auditor flow handles forks (e.g. via App-installation token
    # injection mirroring the LAG_OPS_PAT pattern at line 129).
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      !contains(github.event.pull_request.labels.*.name, 'autonomous-intent')
    permissions:
      checks: write
    steps:
      - name: Post LAG-auditor success check-run
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'LAG-auditor',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'No autonomous-intent label - auditor not required',
                summary: 'Migration shim. See plan-atom plan-add-lag-auditor-noop-job-to-github-workf-cto-actor-20260424231351. When a real unlabeled-PR auditor ships, replace this step with the auditor invocation.'
              }
            });
