name: CI

on:
  push:
    branches: [main]
  # Run on every pull request regardless of base branch so stacked PRs
  # (feature-on-feature) are gated by CI too. Without this, any PR not
  # targeting main would merge with no CI signal.
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: ['22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        # --ignore-scripts skips onnxruntime-node's post-install that
        # fetches a ~90MB nuget package from api.nuget.org. That fetch
        # is flaky on the runner (ETIMEDOUT) and the default test
        # suite doesn't need ONNX (gated behind LAG_REAL_EMBED=1).
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Default test suite (non-gated)
        # Gated suites need ~90MB onnx model, Python bridge, or real
        # Claude CLI; not a fit for CI. Default suite covers adapters,
        # scenarios, and the public-surface contract end-to-end.
        run: npm test

      - name: Quickstart smoke
        # Prove the public API path resolves against the just-built dist.
        # Same assertion is covered by test/public-surface/quickstart.test.ts
        # (runs under `npm test` + `npm run test:public-surface`); this step
        # keeps a bare-spawn signal on every CI run as a belt-and-braces gate.
        run: node examples/quickstart.mjs

  package-hygiene:
    name: package hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        # --ignore-scripts skips onnxruntime-node's post-install that
        # fetches a ~90MB nuget package from api.nuget.org. That fetch
        # is flaky on the runner (ETIMEDOUT) and the default test
        # suite doesn't need ONNX (gated behind LAG_REAL_EMBED=1).
        run: npm ci --ignore-scripts
      - name: Verify no emdashes in source / docs
        # Project convention is no emdashes anywhere. Enforced at CI so a
        # regression is loud. design/ added 2026-04-20 after a design-doc
        # emdash slipped past CI and was caught by a reviewer; the design
        # directory is as much canon as docs/ and must be held to the same
        # bar.
        #
        # --exclude-dir=fixtures: test fixtures capture external output
        # verbatim (e.g., CodeRabbit review bodies the parser must handle).
        # Rewriting emdashes in fixtures would make format-drift tests
        # lie about what the real format looks like. Our content must not
        # contain emdashes; external content we ingest can.
        shell: bash
        run: |
          set -e
          if grep -rP --exclude-dir=fixtures $'\u2014' src/ test/ docs/ design/ README.md examples/ 2>/dev/null; then
            echo "FAIL: emdash(es) found; replace with , ; . or normal -"
            exit 1
          fi
          echo "OK: no emdashes"
      - name: Verify no instance-specific role vocabulary in src/
        # Framework code under src/ must stay mechanism-focused and
        # pluggable. Role/instance names ("thinking CTO", "our CTO",
        # references to a specific principal id in framework
        # primitives) belong in canon, skills, scripts, or examples,
        # not in src/. CodeRabbit flagged this class of leak on PR #32
        # (2026-04-20); this guard prevents recurrence repo-wide.
        # The term list is intentionally narrow: we block phrases
        # that have no mechanism-level meaning, not legitimate class
        # names (HostLlmPlanningJudgment, PlanningActor).
        shell: bash
        run: |
          set -e
          FORBIDDEN='thinking CTO|the cto-actor principal|our CTO|the auditor role'
          HITS=$(grep -rEn "$FORBIDDEN" src/ 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "FAIL: instance-specific role vocabulary in src/:"
            echo "$HITS"
            echo "Move these references to canon, skills, scripts, or examples."
            exit 1
          fi
          echo "OK: no instance-specific role vocabulary in src/"
      - name: Verify no private terms anywhere in tracked files
        shell: bash
        run: |
          set -e
          TERMS='\bphx\b|Phoenix|palace-phoenix'
          # Scan every tracked file (respects .gitignore by construction).
          # Excludes only .github/workflows/ci.yml itself because the guard
          # has to contain the terms in its grep string.
          HITS=$(git ls-files | grep -v '^\.github/workflows/ci\.yml$' | xargs grep -lEi "$TERMS" 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "FAIL: private term(s) found in:"
            echo "$HITS"
            exit 1
          fi
          echo "OK: no private terms anywhere"
      - name: Verify LICENSE present
        run: test -f LICENSE
      - name: Verify dist builds
        run: npm run build && test -f dist/index.js && test -f dist/index.d.ts
      - name: PR under CodeRabbit file-review limit
        # CodeRabbit silently skips review on PRs exceeding 150 changed
        # files. A skipped review posts no `CodeRabbit` commit status,
        # which blocks merge via required-checks with no visible failure
        # until an operator opens the PR and reads the "review skipped"
        # note. Fail CI at push time so the author splits immediately.
        # PR #92 (205 files) and #93 (158 files) both hit this wall on
        # 2026-04-22; this guard prevents silent recurrence.
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -e
          # actions/checkout@v4 on a pull_request event checks out the
          # synthetic refs/pull/N/merge commit. That commit's tree IS
          # the would-be-merged result, so `git diff $BASE_SHA HEAD`
          # gives exactly the changed-files set CodeRabbit would review.
          # The head-branch commit itself is NOT in the local repo on
          # the default checkout, so don't reference it by SHA.
          #
          # The base SHA is also missing by default (shallow fetch);
          # grab just that commit. If the checkout was already deep
          # enough, the fetch is a cheap no-op.
          git fetch origin "$BASE_SHA" --depth=1 || git fetch --unshallow origin
          # Two-dot (BASE HEAD, not BASE...HEAD) is a direct tree-vs-
          # tree compare. Three-dot would need both endpoints reachable
          # to compute the merge-base, which shallow clones can't
          # guarantee.
          N=$(git diff --name-only "$BASE_SHA" HEAD | wc -l)
          LIMIT=150
          echo "changed files: $N (CodeRabbit limit: $LIMIT)"
          if [ "$N" -gt "$LIMIT" ]; then
            echo "::error::PR has $N changed files, exceeds CodeRabbit's $LIMIT-file review limit."
            echo "CodeRabbit will skip this review entirely, blocking merge via the required"
            echo "\"CodeRabbit\" status check. Split this PR into smaller incremental changes"
            echo "(one logical concern per PR, ideally <100 files)."
            exit 1
          fi
          echo "OK: under limit"
